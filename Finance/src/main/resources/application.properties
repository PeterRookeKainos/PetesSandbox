spring.application.name=finance

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/finance}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Comma-separated list of tickers to import on the daily schedule
finance.tickers=AAPL,MSFT,GOOGL

# Cron expression for daily import (default: weekdays at 18:00 UTC, after NYSE close)
finance.import.cron=0 0 18 * * MON-FRI
